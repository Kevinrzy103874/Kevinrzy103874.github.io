<!-- 鼠标点击文字特效 -->
<script type="text/javascript">
var a_idx = 0;
document.addEventListener('DOMContentLoaded', function($) {
    document.body.addEventListener('click', function(e) {
        var a = new Array(
            "算法是思考的诗篇，代码是逻辑的舞蹈",
            "每日一题，让思维保持锋利",
            "在bug的迷雾中寻找最优解",
            "竞赛不是终点，而是成长的起点",
            "键盘敲击间，世界由0和1重构",
            "代码是写给未来的情书",
            "AC 不是终点，而是新的起点",
            "调试一小时，AC 一秒钟",
            "算法之美，在于逻辑的纯粹",
            "OIer 的浪漫，是暴力优化成正解"
        );
        var $i = document.createElement("span");
        $i.textContent = a[a_idx];
        a_idx = (a_idx + 1) % a.length;
        var x = e.pageX,
        y = e.pageY;
        $i.style.cssText = 
            "z-index: 9999999999999999;" +
            "top: " + (y - 20) + "px;" +
            "left: " + x + "px;" +
            "position: absolute;" +
            "font-weight: bold;" +
            "font-size: 32px;" +
            "font-family: 'Long Cang', cursive;" +
            "color: rgb("+~~(255*Math.random())+","+~~(255*Math.random())+","+~~(255*Math.random())+");" +
            "pointer-events: none;" +
            "transition: all 1.5s ease;";
        document.body.appendChild($i);
        
        setTimeout(function() {
            $i.style.top = (y - 180) + "px";
            $i.style.opacity = "0";
        }, 10);
        
        setTimeout(function() {
            $i.remove();
        }, 1500);
    });
});
</script>

<!-- 鼠标点击爱心特效 -->
<script type="text/javascript">
(function(window,document,undefined){
        var hearts = [];
        window.requestAnimationFrame = (function(){
                return window.requestAnimationFrame || 
                           window.webkitRequestAnimationFrame ||
                           window.mozRequestAnimationFrame ||
                           window.oRequestAnimationFrame ||
                           window.msRequestAnimationFrame ||
                           function (callback){
                                   setTimeout(callback,1000/60);
                           }
        })();
        init();
        function init(){
                css(".heart{width: 10px;height: 10px;position: fixed;background: #f00;transform: rotate(45deg);-webkit-transform: rotate(45deg);-moz-transform: rotate(45deg);z-index: 999999;pointer-events: none;}.heart:after,.heart:before{content: '';width: inherit;height: inherit;background: inherit;border-radius: 50%;-webkit-border-radius: 50%;-moz-border-radius: 50%;position: absolute;}.heart:after{top: -5px;}.heart:before{left: -5px;}");
                attachEvent();
                gameloop();
        }
        function gameloop(){
                for(var i=0;i<hearts.length;i++){
                    if(hearts[i].alpha <=0){
                            document.body.removeChild(hearts[i].el);
                            hearts.splice(i,1);
                            continue;
                    }
                    hearts[i].y--;
                    hearts[i].scale += 0.004;
                    hearts[i].alpha -= 0.013;
                    hearts[i].el.style.cssText = "left:"+hearts[i].x+"px;top:"+hearts[i].y+"px;opacity:"+hearts[i].alpha+";transform:scale("+hearts[i].scale+","+hearts[i].scale+") rotate(45deg);background:"+hearts[i].color;
            }
            requestAnimationFrame(gameloop);
        }
        function attachEvent(){
                var old = typeof window.onclick==="function" && window.onclick;
                window.onclick = function(event){
                        old && old();
                        createHeart(event);
                }
        }
        function createHeart(event){
            var d = document.createElement("div");
            d.className = "heart";
            hearts.push({
                    el : d,
                    x : event.clientX - 5,
                    y : event.clientY - 5,
                    scale : 1,
                    alpha : 1,
                    color : "rgb("+(~~(Math.random()*255))+","+(~~(Math.random()*255))+","+(~~(Math.random()*255))+")"
            });
            document.body.appendChild(d);
    }
    function css(css){
            var style = document.createElement("style");
                style.type="text/css";
                try{
                    style.appendChild(document.createTextNode(css));
                }catch(ex){
                    style.styleSheet.cssText = css;
                }
                document.getElementsByTagName('head')[0].appendChild(style);
    }
})(window,document);
</script>
