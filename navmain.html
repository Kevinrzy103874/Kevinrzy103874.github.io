<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>网络导航航标</title>
    <!-- 预连接加速 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 现代字体: Space Grotesk + 科技感 -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 专业图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 引入 canvas 粒子库 - 轻量动态背景 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #05070f;
            color: #eef5ff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Canvas 粒子背景 (全屏动感) */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            display: block;
            pointer-events: none;
        }

        /* 动态渐变光晕层 */
        .dynamic-glow {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(59, 130, 246, 0.15), rgba(0, 0, 0, 0.4) 80%);
            z-index: -1;
            pointer-events: none;
            animation: breatheGlow 8s infinite alternate;
        }

        @keyframes breatheGlow {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.8rem 2rem 4rem;
            position: relative;
            backdrop-filter: blur(0px);
        }

        /* 头部区域 (科技导航栏) */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 3rem;
            padding: 0.8rem 1.5rem;
            background: rgba(10, 20, 40, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.3s;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
        }

        .logo-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 8px #3b82f6);
            animation: iconPulse 2s infinite ease;
        }

        @keyframes iconPulse {
            0% { text-shadow: 0 0 0px #3b82f6; }
            50% { text-shadow: 0 0 10px #3b82f6; }
            100% { text-shadow: 0 0 0px #3b82f6; }
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #c4e0ff, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .stats-pill {
            display: flex;
            gap: 1.2rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            padding: 0.4rem 1.4rem;
            border-radius: 60px;
            border: 1px solid rgba(59, 130, 246, 0.5);
        }

        .stats-pill span {
            font-size: 0.8rem;
            font-weight: 500;
        }

        .stats-pill i {
            margin-right: 6px;
            color: #3b82f6;
        }

        /* 主视觉：动态文字 */
        .hero-vision {
            text-align: center;
            margin: 2rem 0 2.8rem;
        }

        .glitch-text {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(125deg, #fff, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            animation: glitchShift 3s infinite;
        }

        @keyframes glitchShift {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; text-shadow: 0 0 2px cyan; }
            95% { transform: skew(0deg, 0deg); opacity: 1; }
            96% { transform: skew(2deg, 1deg); text-shadow: -2px 0 #ff00c1; }
            97% { transform: skew(-2deg, -1deg); text-shadow: 2px 0 #00fff9; }
            98% { transform: skew(0deg, 0deg); }
        }

        .hero-vision p {
            font-size: 1rem;
            color: #94a3d8;
            margin-top: 0.6rem;
            letter-spacing: 0.5px;
        }

        /* 分类导航栏 动感悬浮 */
        .category-rail {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 3rem;
        }

        .cat-nav {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.4);
            padding: 0.6rem 1.6rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5ff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .cat-nav i {
            margin-right: 8px;
        }

        .cat-nav::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent);
            transition: left 0.6s;
        }

        .cat-nav:hover::before {
            left: 100%;
        }

        .cat-nav:hover {
            transform: translateY(-3px);
            border-color: #3b82f6;
            box-shadow: 0 6px 16px -6px #3b82f6;
            background: rgba(59, 130, 246, 0.2);
        }

        .cat-nav.active {
            background: linear-gradient(95deg, #3b82f6, #a855f7);
            border-color: #ffffff80;
            color: white;
            box-shadow: 0 0 15px #3b82f6;
        }

        /* 网格布局 */
        .sites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 2rem;
        }

        /* 卡片特效: 流光边框 + 动感悬浮 */
        .nav-card {
            background: rgba(12, 20, 35, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            position: relative;
            overflow: hidden;
            animation: cardFloatIn 0.5s ease-out backwards;
        }

        /* 流光边框动画 (悬停时) */
        .nav-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(125deg, #3b82f6, #a855f7, #ec489a, #3b82f6);
            border-radius: 34px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
            background-size: 300% 300%;
            animation: borderFlow 3s infinite alternate;
        }

        .nav-card:hover::after {
            opacity: 0.7;
        }

        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .nav-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: transparent;
            box-shadow: 0 25px 35px -12px rgba(59, 130, 246, 0.3);
            background: rgba(20, 30, 55, 0.85);
        }

        .card-content {
            padding: 1.7rem;
            position: relative;
            z-index: 2;
        }

        /* 站点头部 */
        .site-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .site-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(145deg, #1e2a4a, #0f172a);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 600;
            color: #60a5fa;
            box-shadow: 0 8px 16px -6px rgba(0, 0, 0, 0.4);
            border: 1px solid #3b82f680;
            transition: all 0.3s;
        }

        .nav-card:hover .site-icon {
            transform: rotate(3deg) scale(1.02);
            border-color: #a855f7;
            color: #c084fc;
        }

        .site-info {
            flex: 1;
        }

        .site-name {
            font-size: 1.35rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .site-name i {
            font-size: 0.85rem;
            color: #60a5fa;
            transition: transform 0.2s;
        }

        .nav-card:hover .site-name i {
            transform: translateX(4px);
        }

        .site-cat {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.25);
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            margin-top: 6px;
            backdrop-filter: blur(2px);
        }

        /* 描述 */
        .site-desc {
            font-size: 0.88rem;
            line-height: 1.45;
            color: #b9c8ff;
            margin: 0.9rem 0 1rem;
        }

        /* 标签 */
        .site-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .site-tag {
            background: rgba(79, 70, 229, 0.2);
            font-size: 0.7rem;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-weight: 500;
            color: #b9c8ff;
            transition: all 0.2s;
        }

        .nav-card:hover .site-tag {
            background: rgba(139, 92, 246, 0.4);
        }

        /* 行动区：链接特效核心 */
        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(59, 130, 246, 0.3);
            padding-top: 1rem;
        }

        /* 极具动感的链接按钮 */
        .nav-link {
            text-decoration: none;
            background: rgba(59, 130, 246, 0.12);
            padding: 0.5rem 1.3rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #eef2ff;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.35s ease;
            border: 1px solid rgba(59, 130, 246, 0.5);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* 波纹特效 */
        .nav-link::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5), rgba(59, 130, 246, 0.8));
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
            z-index: 0;
            opacity: 0;
        }

        .nav-link:active::before {
            width: 180px;
            height: 180px;
            opacity: 0.5;
            transition: 0s;
        }

        .nav-link i {
            position: relative;
            z-index: 2;
            transition: transform 0.2s ease;
        }

        .nav-link span {
            position: relative;
            z-index: 2;
        }

        .nav-link:hover {
            background: linear-gradient(95deg, #3b82f6, #8b5cf6);
            border-color: #c084fc;
            color: white;
            box-shadow: 0 0 12px #3b82f6;
            transform: scale(1.02);
        }

        .nav-link:hover i {
            transform: translateX(6px) rotate(-5deg);
            filter: drop-shadow(0 0 3px white);
        }

        /* 元数据 */
        .meta-info {
            font-size: 0.7rem;
            color: #7c8db0;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .nav-card:hover .meta-info {
            color: #b9c8ff;
        }

        /* 空状态 */
        .empty-guide {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 48px;
            backdrop-filter: blur(8px);
        }

        /* 页脚动态 */
        .footer-compass {
            margin-top: 4rem;
            padding-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #6c7aa5;
            border-top: 1px solid rgba(59, 130, 246, 0.3);
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        /* 卡片入场动画 */
        @keyframes cardFloatIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 720px) {
            .container {
                padding: 1rem;
            }
            .glitch-text {
                font-size: 2rem;
            }
            .nav-header {
                border-radius: 40px;
                padding: 0.6rem 1rem;
            }
        }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>
<div class="dynamic-glow"></div>

<div class="container">
    <div class="nav-header">
        <div class="logo-area">
            <i class="fas fa-satellite-dish logo-icon"></i>
            <span class="logo-text">极光航标</span>
        </div>
        <div class="stats-pill">
            <span><i class="fas fa-star-of-life"></i> 信标 <span id="totalBeacons">0</span></span>
            <span><i class="fas fa-wifi"></i> 动态星链</span>
        </div>
    </div>

    <div class="hero-vision">
        <div class="glitch-text">✦ 动态导航枢纽 ✦</div>
        <p><i class="fas fa-bolt"></i> 流光粒子 · 链接脉冲效应 · 即刻启航</p>
    </div>

    <div class="category-rail" id="categoryRail">
        <div class="cat-nav active" data-cat="all"><i class="fas fa-globe"></i> 全部航点</div>
    </div>

    <div class="sites-grid" id="sitesGrid"></div>

    <div class="footer-compass">
        <span><i class="fas fa-bolt"></i> 链接脉冲 · 动态互联</span>
        <span><i class="fas fa-hand-sparkles"></i> 每次点击都有光效涟漪</span>
        <span><i class="fas fa-sync-alt"></i> 实时粒子系统</span>
    </div>
</div>

<script>
    // ======================= 1. 粒子背景 (动感canvas) =======================
    const canvas = document.getElementById('particleCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let particleCount = 90;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2.2 + 1;
            this.speedX = (Math.random() - 0.5) * 0.4;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.color = `rgba(59, 130, 246, ${Math.random() * 0.4 + 0.2})`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    }

    function animateParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let p of particles) {
            p.update();
            p.draw();
        }
        // 绘制连接线 (增加科技感)
        ctx.beginPath();
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 100) {
                    ctx.strokeStyle = `rgba(59, 130, 246, ${0.15 * (1 - distance / 100)})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        initParticles();
    });
    resizeCanvas();
    initParticles();
    animateParticles();

    // ======================= 2. 站点数据 =======================
    const sitesData = [
        { id: 1, name: "我的博客", initial: "Blog", iconFa: "fas fa-feather", category: "", description: "个人技术博客，分享前端开发、编程心得与日常思考。", tags: ["", "", ""], url: "https://kevinrzy103874.github.io/", visitHint: "码农家园" },
        { id: 2, name: "我的论坛", initial: "Discussions", iconFa: "fas fa-ship", category: "", description: "自由交流社区，探讨技术、生活与创意，共建温暖社群。", tags: ["", "", ""], url: "https://kevinrzy103874.freeflarum.com/", visitHint: "灵感频率" },
    ];

    let activeCategory = "all";

    function renderSites(category) {
        const grid = document.getElementById("sitesGrid");
        const filtered = category === "all" ? sitesData : sitesData.filter(s => s.category === category);
        document.getElementById("totalBeacons").innerText = sitesData.length;

        if (filtered.length === 0) {
            grid.innerHTML = `<div class="empty-guide"><i class="fas fa-satellite"></i> 暂无此航道星标，请切换探索</div>`;
            return;
        }

        const catChinese = { tech: "技术星云", blog: "思想驿站", design: "美学构筑", life: "生活余音", tool: "工具舱" };
        let html = "";
        filtered.forEach(site => {
            const categoryLabel = catChinese[site.category] || "灵感站点";
            const avatarContent = site.iconFa ? `<i class="${site.iconFa}"></i>` : site.initial;
            html += `
                <div class="nav-card">
                    <div class="card-content">
                        <div class="site-header">
                            <div class="site-icon">${avatarContent}</div>
                            <div class="site-info">
                                <div class="site-name">${site.name} <i class="fas fa-external-link-alt"></i></div>
                                <div class="site-cat"><i class="fas fa-tag"></i> ${categoryLabel}</div>
                            </div>
                        </div>
                        <div class="site-desc">${site.description}</div>
                        <div class="site-tags">${site.tags.map(t => `<span class="site-tag">#${t}</span>`).join('')}</div>
                        <div class="action-row">
                            <a href="${site.url}" target="_blank" rel="noopener noreferrer" class="nav-link" data-ripple>
                                <i class="fas fa-location-arrow"></i> <span>脉冲跃迁</span>
                            </a>
                            <div class="meta-info"><i class="fas fa-charging-station"></i> ${site.visitHint}</div>
                        </div>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;
        attachLinkRipple();
    }

    // 为所有动态链接添加额外的光效反馈
    function attachLinkRipple() {
        document.querySelectorAll('.nav-link').forEach(btn => {
            btn.addEventListener('click', function(e) {
                let ripple = document.createElement('span');
                ripple.classList.add('ripple-effect');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = 'rgba(255,255,255,0.6)';
                ripple.style.width = '0px';
                ripple.style.height = '0px';
                ripple.style.left = `${e.offsetX}px`;
                ripple.style.top = `${e.offsetY}px`;
                ripple.style.transform = 'translate(-50%, -50%)';
                ripple.style.transition = 'width 0.4s, height 0.4s, opacity 0.4s';
                ripple.style.pointerEvents = 'none';
                ripple.style.zIndex = '20';
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                setTimeout(() => { ripple.style.width = '180px'; ripple.style.height = '180px'; ripple.style.opacity = '0'; }, 10);
                setTimeout(() => ripple.remove(), 500);
            });
        });
    }

    function initFilters() {
        const btns = document.querySelectorAll(".cat-nav");
        btns.forEach(btn => {
            btn.addEventListener("click", () => {
                const cat = btn.getAttribute("data-cat");
                if (!cat) return;
                activeCategory = cat;
                btns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                renderSites(activeCategory);
            });
        });
    }

    renderSites("all");
    initFilters();
    attachLinkRipple();

    // 鼠标跟随光晕加强 (高级动感)
    document.addEventListener('mousemove', (e) => {
        const glow = document.querySelector('.dynamic-glow');
        if (glow) {
            let x = e.clientX / window.innerWidth;
            let y = e.clientY / window.innerHeight;
            glow.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(59,130,246,0.25), rgba(0,0,0,0.6) 80%)`;
        }
    });
</script>
</body>
</html>
