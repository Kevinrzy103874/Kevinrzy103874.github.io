<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>极光航标 | 个人主页 & 友链星图</title>
    <!-- 预连接加速 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 现代字体: Space Grotesk + 科技感 -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 专业图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #05070f;
            color: #eef5ff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Canvas 粒子背景 (全屏动感) */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            display: block;
            pointer-events: none;
        }

        /* 动态渐变光晕层 */
        .dynamic-glow {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(59, 130, 246, 0.15), rgba(0, 0, 0, 0.4) 80%);
            z-index: -1;
            pointer-events: none;
            animation: breatheGlow 8s infinite alternate;
        }

        @keyframes breatheGlow {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.8rem 2rem 4rem;
            position: relative;
        }

        /* 头部区域 (科技导航栏) */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding: 0.8rem 1.5rem;
            background: rgba(10, 20, 40, 0.45);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.3s;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
        }

        .logo-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 8px #3b82f6);
            animation: iconPulse 2s infinite ease;
        }

        @keyframes iconPulse {
            0% { text-shadow: 0 0 0px #3b82f6; }
            50% { text-shadow: 0 0 10px #3b82f6; }
            100% { text-shadow: 0 0 0px #3b82f6; }
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #c4e0ff, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .stats-pill {
            display: flex;
            gap: 1.2rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            padding: 0.4rem 1.4rem;
            border-radius: 60px;
            border: 1px solid rgba(59, 130, 246, 0.5);
        }

        .stats-pill span {
            font-size: 0.8rem;
            font-weight: 500;
        }

        .stats-pill i {
            margin-right: 6px;
            color: #3b82f6;
        }

        /* 主视觉：动态文字 - 个人网站标识 */
        .hero-vision {
            text-align: center;
            margin: 1.5rem 0 2rem;
        }

        .glitch-text {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(125deg, #fff, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            animation: glitchShift 3s infinite;
        }

        @keyframes glitchShift {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; text-shadow: 0 0 2px cyan; }
            95% { transform: skew(0deg, 0deg); opacity: 1; }
            96% { transform: skew(2deg, 1deg); text-shadow: -2px 0 #ff00c1; }
            97% { transform: skew(-2deg, -1deg); text-shadow: 2px 0 #00fff9; }
            98% { transform: skew(0deg, 0deg); }
        }

        .hero-vision p {
            font-size: 1rem;
            color: #94a3d8;
            margin-top: 0.6rem;
            letter-spacing: 0.5px;
        }

        /* 个人网站快捷导航区 (个人网站内部链接) */
        .personal-nav-strip {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1.8rem 0 2.5rem;
        }

        .personal-link {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.5);
            padding: 0.7rem 1.8rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #eef2ff;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .personal-link:hover {
            background: linear-gradient(95deg, #3b82f6, #8b5cf6);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px -6px #3b82f6;
            border-color: #c084fc;
        }

        /* 分类导航栏 */
        .category-rail {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
        }

        .cat-nav {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.4);
            padding: 0.6rem 1.6rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5ff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .cat-nav i {
            margin-right: 8px;
        }

        .cat-nav::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent);
            transition: left 0.6s;
        }

        .cat-nav:hover::before {
            left: 100%;
        }

        .cat-nav:hover {
            transform: translateY(-3px);
            border-color: #3b82f6;
            box-shadow: 0 6px 16px -6px #3b82f6;
            background: rgba(59, 130, 246, 0.2);
        }

        .cat-nav.active {
            background: linear-gradient(95deg, #3b82f6, #a855f7);
            border-color: #ffffff80;
            color: white;
            box-shadow: 0 0 15px #3b82f6;
        }

        /* 网格布局 */
        .sites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        /* 卡片特效 */
        .nav-card {
            background: rgba(12, 20, 35, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            position: relative;
            overflow: hidden;
            animation: cardFloatIn 0.5s ease-out backwards;
        }

        .nav-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(125deg, #3b82f6, #a855f7, #ec489a, #3b82f6);
            border-radius: 34px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
            background-size: 300% 300%;
            animation: borderFlow 3s infinite alternate;
        }

        .nav-card:hover::after {
            opacity: 0.7;
        }

        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .nav-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: transparent;
            box-shadow: 0 25px 35px -12px rgba(59, 130, 246, 0.3);
            background: rgba(20, 30, 55, 0.85);
        }

        .card-content {
            padding: 1.7rem;
            position: relative;
            z-index: 2;
        }

        .site-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .site-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(145deg, #1e2a4a, #0f172a);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 600;
            color: #60a5fa;
            box-shadow: 0 8px 16px -6px rgba(0, 0, 0, 0.4);
            border: 1px solid #3b82f680;
            transition: all 0.3s;
        }

        .nav-card:hover .site-icon {
            transform: rotate(3deg) scale(1.02);
            border-color: #a855f7;
            color: #c084fc;
        }

        .site-info {
            flex: 1;
        }

        .site-name {
            font-size: 1.35rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .site-name i {
            font-size: 0.85rem;
            color: #60a5fa;
            transition: transform 0.2s;
        }

        .nav-card:hover .site-name i {
            transform: translateX(4px);
        }

        .site-cat {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.25);
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            margin-top: 6px;
        }

        .site-desc {
            font-size: 0.88rem;
            line-height: 1.45;
            color: #b9c8ff;
            margin: 0.9rem 0 1rem;
        }

        .site-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .site-tag {
            background: rgba(79, 70, 229, 0.2);
            font-size: 0.7rem;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-weight: 500;
            color: #b9c8ff;
        }

        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(59, 130, 246, 0.3);
            padding-top: 1rem;
        }

        .nav-link {
            text-decoration: none;
            background: rgba(59, 130, 246, 0.12);
            padding: 0.5rem 1.3rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #eef2ff;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.35s ease;
            border: 1px solid rgba(59, 130, 246, 0.5);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.5), rgba(59, 130, 246, 0.8));
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
            z-index: 0;
            opacity: 0;
        }

        .nav-link:active::before {
            width: 180px;
            height: 180px;
            opacity: 0.5;
            transition: 0s;
        }

        .nav-link i, .nav-link span {
            position: relative;
            z-index: 2;
        }

        .nav-link:hover {
            background: linear-gradient(95deg, #3b82f6, #8b5cf6);
            border-color: #c084fc;
            color: white;
            box-shadow: 0 0 12px #3b82f6;
            transform: scale(1.02);
        }

        .nav-link:hover i {
            transform: translateX(6px) rotate(-5deg);
        }

        .meta-info {
            font-size: 0.7rem;
            color: #7c8db0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .empty-guide {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 48px;
            backdrop-filter: blur(8px);
        }

        .footer-compass {
            margin-top: 4rem;
            padding-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #6c7aa5;
            border-top: 1px solid rgba(59, 130, 246, 0.3);
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        @keyframes cardFloatIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 720px) {
            .container {
                padding: 1rem;
            }
            .glitch-text {
                font-size: 2rem;
            }
            .nav-header {
                border-radius: 40px;
                padding: 0.6rem 1rem;
            }
            .sites-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<canvas id="particleCanvas"></canvas>
<div class="dynamic-glow"></div>

<div class="container">
    <div class="nav-header">
        <div class="logo-area">
            <i class="fas fa-satellite-dish logo-icon"></i>
            <span class="logo-text">极光航标</span>
        </div>
        <div class="stats-pill">
            <span><i class="fas fa-star-of-life"></i> 信标 <span id="totalBeacons">0</span></span>
            <span><i class="fas fa-wifi"></i> 动态星链</span>
        </div>
    </div>

    <div class="hero-vision">
        <div class="glitch-text">✦ 个人星域 · 友链银河 ✦</div>
    </div>

    <!-- 个人网站快捷导航区 (从json加载) -->
    <div class="personal-nav-strip" id="personalNavStrip"></div>

    <!-- 友链分类导航栏 -->
    <div class="category-rail" id="categoryRail">
        <div class="cat-nav active" data-cat="all"><i class="fas fa-globe"></i> 全部友链</div>
    </div>

    <!-- 友链卡片网格 -->
    <div class="sites-grid" id="sitesGrid"></div>

    <div class="footer-compass">
    </div>
</div>

<script>
    // ======================= 粒子背景 (保留原有效果) =======================
    const canvas = document.getElementById('particleCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let particleCount = 90;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2.2 + 1;
            this.speedX = (Math.random() - 0.5) * 0.4;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.color = `rgba(59, 130, 246, ${Math.random() * 0.4 + 0.2})`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    }

    function animateParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let p of particles) {
            p.update();
            p.draw();
        }
        ctx.beginPath();
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 100) {
                    ctx.strokeStyle = `rgba(59, 130, 246, ${0.15 * (1 - distance / 100)})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        initParticles();
    });
    resizeCanvas();
    initParticles();
    animateParticles();

    // 鼠标跟随光晕
    document.addEventListener('mousemove', (e) => {
        const glow = document.querySelector('.dynamic-glow');
        if (glow) {
            let x = e.clientX / window.innerWidth;
            let y = e.clientY / window.innerHeight;
            glow.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(59,130,246,0.25), rgba(0,0,0,0.6) 80%)`;
        }
    });

    // ======================= 数据模型 & JSON 加载 =======================
    // 数据结构：
    // {
    //   "personalNav": [ { "name": "博客", "url": "https://...", "icon": "fas fa-blog" } ],
    //   "friendCategories": [
    //     { "categoryName": "技术社区", "links": [ { "name": "GitHub", "url": "https://...", "desc": "开源世界", "icon": "fab fa-github", "tags": ["开发","协作"] } ] }
    //   ]
    // }
    
    let appData = {
        personalNav: [],      // 个人网站链接
        friendCategories: []  // 友链分类数组
    };
    
    let activeCategory = "all";  // 当前选中的分类名称或 "all"

    // 从 mainnavlist.json 加载数据，失败则使用内置示例
    async function loadData() {
        try {
            const response = await fetch('./mainnavlist.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const json = await response.json();
            if (json.personalNav && Array.isArray(json.personalNav)) {
                appData.personalNav = json.personalNav;
            } else {
                appData.personalNav = [];
            }
            if (json.friendCategories && Array.isArray(json.friendCategories)) {
                appData.friendCategories = json.friendCategories;
            } else {
                appData.friendCategories = [];
            }
        } catch (err) {
            console.warn('未找到 mainnavlist.json，使用默认示例数据。请创建该文件并遵循格式。', err);
            // 内置示例数据 (包含个人网站和友链)
            appData.personalNav = [
                { name: "🏠 首页", url: "https://kevinrzy103874.github.io/navmain.html", icon: "fas fa-home" },
                { name: "📝 技术博客", url: "https://kevinrzy103874.github.io/", icon: "fas fa-feather-alt" },
                { name: "💬 论坛", url: "https://kevinrzy103874.freeflarum.com/", icon: "fas fa-comments" },
                { name: "✨ 关于我", url: "#", icon: "fas fa-user-astronaut" }
            ];
            appData.friendCategories = [
                {
                    categoryName: "🚀 开发者星系",
                    links: [
                        { name: "GitHub", url: "https://github.com", desc: "全球开源社区，代码的星辰大海", icon: "fab fa-github", tags: ["开源", "协作"] },
                        { name: "Vercel", url: "https://vercel.com", desc: "极速部署现代应用", icon: "fas fa-cloud-upload-alt", tags: ["部署", "前端"] },
                        { name: "Stack Overflow", url: "https://stackoverflow.com", desc: "编程问题解答社区", icon: "fab fa-stack-overflow", tags: ["问答", "代码"] }
                    ]
                },
                {
                    categoryName: "🎨 灵感美学",
                    links: [
                        { name: "Dribbble", url: "https://dribbble.com", desc: "全球顶尖设计创意社区", icon: "fab fa-dribbble", tags: ["UI", "灵感"] },
                        { name: "Awwwards", url: "https://www.awwwards.com", desc: "网页设计颁奖圣地", icon: "fas fa-trophy", tags: ["设计", "创新"] }
                    ]
                },
                {
                    categoryName: "📡 创作者矩阵",
                    links: [
                        { name: "少数派", url: "https://sspai.com", desc: "高效工作与数字生活", icon: "fas fa-microchip", tags: ["效率", "数码"] },
                        { name: "即刻", url: "https://okjike.com", desc: "年轻人的兴趣社区", icon: "fas fa-bolt", tags: ["社交", "新鲜事"] }
                    ]
                }
            ];
        }
        // 确保每个友链都有 tags 字段
        appData.friendCategories.forEach(cat => {
            cat.links = cat.links.map(link => ({
                ...link,
                tags: link.tags || ["推荐"],
                icon: link.icon || "fas fa-link"
            }));
        });
        // 如果个人导航为空，给一个默认提示
        if (appData.personalNav.length === 0) {
            appData.personalNav = [{ name: "个人站点", url: "#", icon: "fas fa-globe" }];
        }
    }

    // 渲染个人网站快捷导航栏
    function renderPersonalNav() {
        const container = document.getElementById('personalNavStrip');
        if (!container) return;
        if (appData.personalNav.length === 0) {
            container.innerHTML = '<div style="color:#94a3d8">暂无个人导航链接，请在 mainnavlist.json 中配置 personalNav</div>';
            return;
        }
        const html = appData.personalNav.map(item => `
            <a href="${escapeHtml(item.url)}" class="personal-link" target="${item.url === '#' ? '_self' : '_blank'}" rel="noopener noreferrer">
                <i class="${item.icon || 'fas fa-link'}"></i> <span>${escapeHtml(item.name)}</span>
            </a>
        `).join('');
        container.innerHTML = html;
    }

    // 渲染友链分类导航按钮 (从 friendCategories 动态生成)
    function renderCategoryFilters() {
        const rail = document.getElementById('categoryRail');
        if (!rail) return;
        let buttons = `<div class="cat-nav active" data-cat="all"><i class="fas fa-globe"></i> 全部友链</div>`;
        appData.friendCategories.forEach(cat => {
            const safeCatName = cat.categoryName;
            buttons += `<div class="cat-nav" data-cat="${escapeAttr(safeCatName)}"><i class="fas fa-folder-open"></i> ${escapeHtml(safeCatName)}</div>`;
        });
        rail.innerHTML = buttons;
        // 重新绑定事件
        document.querySelectorAll('.cat-nav').forEach(btn => {
            btn.addEventListener('click', () => {
                const cat = btn.getAttribute('data-cat');
                if (!cat) return;
                activeCategory = cat;
                document.querySelectorAll('.cat-nav').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderFriendLinks();
            });
        });
    }

    // 渲染友链卡片
    function renderFriendLinks() {
        const grid = document.getElementById('sitesGrid');
        if (!grid) return;
        
        let allLinks = [];
        // 展平所有分类的链接，同时记录所属分类名
        const flatLinks = [];
        appData.friendCategories.forEach(cat => {
            cat.links.forEach(link => {
                flatLinks.push({
                    ...link,
                    categoryName: cat.categoryName
                });
            });
        });
        
        let filtered = [];
        if (activeCategory === 'all') {
            filtered = flatLinks;
        } else {
            filtered = flatLinks.filter(link => link.categoryName === activeCategory);
        }
        
        document.getElementById('totalBeacons').innerText = flatLinks.length;
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="empty-guide"><i class="fas fa-satellite"></i> 暂无此航道星标，请切换探索</div>`;
            return;
        }
        
        let html = "";
        filtered.forEach(link => {
            const displayIcon = link.icon || "fas fa-link";
            const tagsHtml = (link.tags || []).map(tag => `<span class="site-tag">#${escapeHtml(tag)}</span>`).join('');
            html += `
                <div class="nav-card">
                    <div class="card-content">
                        <div class="site-header">
                            <div class="site-icon"><i class="${displayIcon}"></i></div>
                            <div class="site-info">
                                <div class="site-name">${escapeHtml(link.name)} <i class="fas fa-external-link-alt"></i></div>
                                <div class="site-cat"><i class="fas fa-tag"></i> ${escapeHtml(link.categoryName)}</div>
                            </div>
                        </div>
                        <div class="site-desc">${escapeHtml(link.desc || '探索精彩内容')}</div>
                        <div class="site-tags">${tagsHtml}</div>
                        <div class="action-row">
                            <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer" class="nav-link" data-ripple>
                                <i class="fas fa-location-arrow"></i> <span>脉冲跃迁</span>
                            </a>
                            <div class="meta-info"><i class="fas fa-charging-station"></i> 即刻访问</div>
                        </div>
                    </div>
                </div>
            `;
        });
        grid.innerHTML = html;
        attachLinkRipple();
    }
    
    function attachLinkRipple() {
        document.querySelectorAll('.nav-link').forEach(btn => {
            btn.addEventListener('click', function(e) {
                let ripple = document.createElement('span');
                ripple.classList.add('ripple-effect');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = 'rgba(255,255,255,0.6)';
                ripple.style.width = '0px';
                ripple.style.height = '0px';
                ripple.style.left = `${e.offsetX}px`;
                ripple.style.top = `${e.offsetY}px`;
                ripple.style.transform = 'translate(-50%, -50%)';
                ripple.style.transition = 'width 0.4s, height 0.4s, opacity 0.4s';
                ripple.style.pointerEvents = 'none';
                ripple.style.zIndex = '20';
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                setTimeout(() => { ripple.style.width = '180px'; ripple.style.height = '180px'; ripple.style.opacity = '0'; }, 10);
                setTimeout(() => ripple.remove(), 500);
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function escapeAttr(str) {
        if (!str) return '';
        return str.replace(/[&"']/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '"') return '&quot;';
            if (m === "'") return '&#39;';
            return m;
        });
    }
    
    // 主启动流程
    async function init() {
        await loadData();
        renderPersonalNav();
        renderCategoryFilters();
        renderFriendLinks();
    }
    
    init();
</script>
</body>
</html>
