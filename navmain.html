<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>网络航标 | 个人导航 · 灵感之境</title>
    <!-- 预连接加速 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 优雅字体: Plus Jakarta Sans + 等宽点缀 -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 专业图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0a0c15;
            color: #eef2ff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 动态星空/网格背景 - 气派深邃 */
        .bg-orb {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, #0f1222, #03050b);
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.08) 1px, transparent 1px);
            background-size: 48px 48px;
            z-index: -1;
            pointer-events: none;
        }

        /* 动态光晕 */
        .glow-sphere {
            position: fixed;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.25), rgba(6, 182, 212, 0) 70%);
            top: -30vh;
            right: -20vw;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
        }

        .glow-sphere-2 {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2), rgba(0, 0, 0, 0) 70%);
            bottom: -20vh;
            left: -15vw;
            filter: blur(100px);
            z-index: -1;
        }

        /* 主容器 - 宽敞导航感 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            position: relative;
        }

        /* 头部导航风格 — 气派、极简、科技 */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 4rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .logo-icon {
            font-size: 2rem;
            background: linear-gradient(125deg, #a5f3fc, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.3px;
            background: linear-gradient(to right, #f0f9ff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge-slogan {
            background: rgba(255,255,240,0.05);
            backdrop-filter: blur(8px);
            padding: 0.4rem 1rem;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 400;
            border: 1px solid rgba(99, 102, 241, 0.4);
            color: #b9c3e6;
        }

        .stats-pill {
            display: flex;
            gap: 1rem;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(12px);
            padding: 0.5rem 1.4rem;
            border-radius: 80px;
            border: 1px solid rgba(71, 85, 105, 0.5);
        }

        .stats-pill span {
            font-size: 0.8rem;
            font-weight: 500;
        }

        .stats-pill i {
            margin-right: 6px;
            color: #38bdf8;
        }

        /* 主视觉：导航格言 */
        .hero-vision {
            margin-bottom: 3.5rem;
            text-align: center;
        }

        .hero-vision h1 {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #eef2ff, #a5b4fc, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }

        .hero-vision p {
            font-size: 1.05rem;
            color: #9ca3cf;
            max-width: 620px;
            margin: 0 auto;
            font-weight: 400;
        }

        /* 航标分类栏 — 类似导航站的分组切换，高级磨砂 */
        .category-rail {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 3rem;
            padding: 0.5rem;
        }

        .cat-nav {
            background: rgba(20, 27, 45, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 85, 105, 0.5);
            padding: 0.55rem 1.4rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5e6;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.2px;
        }

        .cat-nav i {
            margin-right: 6px;
            font-size: 0.8rem;
        }

        .cat-nav:hover {
            background: #2d3a5e;
            border-color: #818cf8;
            color: white;
            transform: translateY(-2px);
        }

        .cat-nav.active {
            background: #4f46e5;
            border-color: #818cf8;
            color: white;
            box-shadow: 0 8px 20px -12px #4f46e5;
        }

        /* 网格布局 — 精密导航卡片，更大气，弱化"友链"字眼，强调"站点 · 航标" */
        .sites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
        }

        /* 卡片：类似仪表盘风格，毛玻璃+边框发光 */
        .nav-card {
            background: rgba(18, 25, 45, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(71, 85, 105, 0.4);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
            position: relative;
        }

        .nav-card:hover {
            transform: translateY(-6px);
            background: rgba(28, 38, 62, 0.75);
            border-color: rgba(129, 140, 248, 0.7);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(99, 102, 241, 0.2);
        }

        .card-content {
            padding: 1.6rem;
        }

        /* 站点头部 */
        .site-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .site-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, #1e293b, #111827);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 600;
            color: #a5f3fc;
            box-shadow: 0 8px 14px -6px rgba(0,0,0,0.3);
            border: 1px solid rgba(56, 189, 248, 0.3);
            transition: all 0.2s;
        }

        .site-info {
            flex: 1;
        }

        .site-name {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .site-name i {
            font-size: 0.9rem;
            color: #60a5fa;
            opacity: 0.9;
        }

        .site-cat {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            background: rgba(56, 189, 248, 0.2);
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            margin-top: 6px;
            color: #b2ddff;
            letter-spacing: 0.3px;
        }

        /* 站点描述 */
        .site-desc {
            font-size: 0.88rem;
            line-height: 1.45;
            color: #cbd5e1;
            margin: 0.9rem 0 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 标签云 */
        .site-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .site-tag {
            background: rgba(79, 70, 229, 0.15);
            font-size: 0.7rem;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-weight: 500;
            color: #b9c8ff;
            backdrop-filter: blur(2px);
            border: 0.5px solid rgba(99, 102, 241, 0.3);
        }

        /* 行动区域：更像导航跳转 */
        .action-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(71, 85, 105, 0.4);
            padding-top: 1rem;
            margin-top: 0.2rem;
        }

        .nav-link {
            text-decoration: none;
            background: rgba(56, 189, 248, 0.08);
            padding: 0.45rem 1.1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #e0f2fe;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .nav-link i {
            font-size: 0.7rem;
            transition: transform 0.2s;
        }

        .nav-link:hover {
            background: #4f46e5;
            border-color: #818cf8;
            color: white;
        }

        .nav-link:hover i {
            transform: translateX(4px);
        }

        .meta-info {
            font-size: 0.7rem;
            color: #6b728e;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 优雅空状态 */
        .empty-guide {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3.5rem;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            border: 1px dashed #4b5563;
        }

        /* 页脚 — 精致低调 */
        .footer-compass {
            margin-top: 5rem;
            padding-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #6b728e;
            border-top: 1px solid rgba(71, 85, 105, 0.3);
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        /* 响应式 */
        @media (max-width: 720px) {
            .container {
                padding: 1.2rem;
            }
            .hero-vision h1 {
                font-size: 2rem;
            }
            .nav-header {
                flex-direction: column;
                align-items: start;
            }
            .sites-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 动效卡片入场 */
        @keyframes cardRise {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .nav-card {
            animation: cardRise 0.4s ease-out backwards;
        }
    </style>
</head>
<body>
<div class="bg-orb"></div>
<div class="bg-grid"></div>
<div class="glow-sphere"></div>
<div class="glow-sphere-2"></div>

<div class="container">
    <!-- 导航栏头部: 气派标识 而非传统友链字样 -->

        </div>
        <div class="stats-pill">
            <span><i class="fas fa-satellite-dish"></i> 信标 <span id="totalBeacons">0</span></span>
            <span><i class="fas fa-globe"></i> 星群索引</span>
        </div>
    </div>

    <!-- 主视觉：导航站气质 -->
    <div class="hero-vision">
        <h1><i class="fas fa-location-dot"></i> 网络·航标矩阵</h1>
        <p>精选数字角落 · 汇聚思想节点 —— 你的个人导航站，珍藏每一次远航</p>
    </div>

    <!-- 分类导航栏 (类似导航页目录) -->
    <div class="category-rail" id="categoryRail">
        <div class="cat-nav active" data-cat="all"><i class="fas fa-chart-line"></i> 全部航点</div>
        <div class="cat-nav" data-cat="tech"><i class="fas fa-microchip"></i> 技术星云</div>
        <div class="cat-nav" data-cat="blog"><i class="fas fa-pen-ruler"></i> 思想驿站</div>

    <!-- 站点网格 (隐藏友链字眼，展示为导航卡) -->
    <div class="sites-grid" id="sitesGrid"></div>

    <div class="footer-compass">
        <span><i class="far fa-star"></i> 个人导航 · 持续校准</span>
        <span><i class="fas fa-arrow-right"></i> 每一枚航标都是值得驻足的风景</span>
        <span><i class="fas fa-crown"></i> 极简 · 气度 · 互联万象</span>
    </div>
</div>

    // 站点数据 —— 精致导航风格，完全隐藏“友链”词汇，每个站点都是独立推荐

        }
    ];

    let activeCategory = "all";

    // 渲染函数：完全避开“友链”字样，使用导航卡片风格
    function renderSites(category) {
        const grid = document.getElementById("sitesGrid");
        const filtered = category === "all" ? sitesData : sitesData.filter(site => site.category === category);
        
        // 更新总数徽章
        const totalSpan = document.getElementById("totalBeacons");
        if (totalSpan) totalSpan.innerText = sitesData.length;
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="empty-guide"><i class="fas fa-map-marked-alt"></i> 此处暂无航标，调整罗盘探索其他星域</div>`;
            return;
        }
        
        // 分类中文映射
        const catChinese = {
            tech: "技术星云", blog: "思想驿站", design: "美学构筑", life: "生活余音", tool: "工具舱"
        };
        
        let cardsHTML = "";
        filtered.forEach(site => {
            // 优雅展示分类标签
            const categoryLabel = catChinese[site.category] || "灵感站点";
            // 图标优先使用 iconFa，若没有则用首字母
            const avatarContent = site.iconFa ? `<i class="${site.iconFa}"></i>` : site.initial;
            
            cardsHTML += `
                <div class="nav-card">
                    <div class="card-content">
                        <div class="site-header">
                            <div class="site-icon">
                                ${avatarContent}
                            </div>
                            <div class="site-info">
                                <div class="site-name">
                                    ${site.name}
                                    <i class="fas fa-asterisk"></i>
                                </div>
                                <div class="site-cat"><i class="fas fa-tag"></i> ${categoryLabel}</div>
                            </div>
                        </div>
                        <div class="site-desc">
                            ${site.description}
                        </div>
                        <div class="site-tags">
                            ${site.tags.map(tg => `<span class="site-tag">#${tg}</span>`).join('')}
                        </div>
                        <div class="action-row">
                            <a href="${site.url}" target="_blank" rel="noopener noreferrer" class="nav-link">
                                <i class="fas fa-location-arrow"></i> 启航访问
                            </a>
                            <div class="meta-info">
                                <i class="far fa-compass"></i> ${site.visitHint || "航行热点"}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        
        grid.innerHTML = cardsHTML;
    }
    
    // 分类栏交互 + 高亮
    function initNavFilters() {
        const navItems = document.querySelectorAll(".cat-nav");
        navItems.forEach(item => {
            item.addEventListener("click", () => {
                const cat = item.getAttribute("data-cat");
                if (!cat) return;
                activeCategory = cat;
                navItems.forEach(nav => nav.classList.remove("active"));
                item.classList.add("active");
                renderSites(activeCategory);
            });
        });
    }
    
    // 页面初始渲染
    renderSites("all");
    initNavFilters();
    
    // 添加细微的鼠标跟随光效 (可选高级感)
    const handleMove = (e) => {
        const glow = document.querySelector('.glow-sphere');
        if (glow && window.innerWidth > 768) {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            glow.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
        }
    };
    document.addEventListener('mousemove', handleMove);
    
    // 动态标题装饰控制台
    console.log("%c✦ 航标导航站 | 个人网络索引系统 ✦", "color: #a5f3fc; font-size: 14px; font-weight: bold; background: #0f172a; padding: 4px 12px; border-radius: 20px;");
</script>
</body>
</html>
