    /* 遮罩层 - 确保内容可读 */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.7);
        z-index: -1;
        pointer-events: none;

    }

        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        color: #252525;

        color: white !important;
    }

        color: lightblue !important;
    }

    @media only screen and (max-width: 720px) {
        #Snow, canvas, .heart {
            display: none !important;

    <!-- 鼠标点击爱心特效 -->
    <script type="text/javascript">
    (function(window,document,undefined){
            var hearts = [];
            window.requestAnimationFrame = (function(){
                    return window.requestAnimationFrame || 
                               window.webkitRequestAnimationFrame ||
                               window.mozRequestAnimationFrame ||
                               window.oRequestAnimationFrame ||
                               window.msRequestAnimationFrame ||
                               function (callback){
                                       setTimeout(callback,1000/60);
                               }
            })();
            init();
            function init(){
                    css(".heart{width: 10px;height: 10px;position: fixed;background: #f00;transform: rotate(45deg);-webkit-transform: rotate(45deg);-moz-transform: rotate(45deg);z-index: 999999;pointer-events: none;}.heart:after,.heart:before{content: '';width: inherit;height: inherit;background: inherit;border-radius: 50%;-webkit-border-radius: 50%;-moz-border-radius: 50%;position: absolute;}.heart:after{top: -5px;}.heart:before{left: -5px;}");
                    attachEvent();
                    gameloop();
            }
            function gameloop(){
                    for(var i=0;i<hearts.length;i++){
                        if(hearts[i].alpha <=0){
                                document.body.removeChild(hearts[i].el);
                                hearts.splice(i,1);
                                continue;
                        }
                        hearts[i].y--;
                        hearts[i].scale += 0.004;
                        hearts[i].alpha -= 0.013;
                        hearts[i].el.style.cssText = "left:"+hearts[i].x+"px;top:"+hearts[i].y+"px;opacity:"+hearts[i].alpha+";transform:scale("+hearts[i].scale+","+hearts[i].scale+") rotate(45deg);background:"+hearts[i].color;
                }
                requestAnimationFrame(gameloop);
            }
            function attachEvent(){
                    var old = typeof window.onclick==="function" && window.onclick;
                    window.onclick = function(event){
                            old && old();
                            createHeart(event);
                    }
            }
            function createHeart(event){
                var d = document.createElement("div");
                d.className = "heart";
                hearts.push({
                        el : d,
                        x : event.clientX - 5,
                        y : event.clientY - 5,
                        scale : 1,
                        alpha : 1,
                        color : "rgb("+(~~(Math.random()*255))+","+(~~(Math.random()*255))+","+(~~(Math.random()*255))+")"
                });
                document.body.appendChild(d);
        }
        function css(css){
                var style = document.createElement("style");
                    style.type="text/css";
                    try{
                        style.appendChild(document.createTextNode(css));
                    }catch(ex){
                        style.styleSheet.cssText = css;
                    }
                    document.getElementsByTagName('head')[0].appendChild(style);
        }
    })(window,document);
    </script>

    <!-- 标题切换特效 -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const titleConfig = {
            onblurText: '(下次再见,拜拜)qwq人呢?',
            onblurTime: 100,
            focusText: '(欢迎回来,耶)qaq终于回来了',
            focusTime: 2000,
            originalTitle: document.title
        };

        let blurTimer, focusTimer;

        window.addEventListener('blur', () => {
            clearTimeout(focusTimer);
            blurTimer = setTimeout(() => {
                document.title = titleConfig.onblurText;
            }, titleConfig.onblurTime);
        });

        window.addEventListener('focus', () => {
            clearTimeout(blurTimer);
            document.title = titleConfig.originalTitle;
            focusTimer = setTimeout(() => {
                document.title = titleConfig.focusText;
                focusTimer = setTimeout(() => {
                    document.title = titleConfig.originalTitle;
                }, titleConfig.focusTime);
            }, 100);
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearTimeout(focusTimer);
                blurTimer = setTimeout(() => {
                    document.title = titleConfig.onblurText;
                }, titleConfig.onblurTime);
            } else {
                clearTimeout(blurTimer);
                document.title = titleConfig.originalTitle;
                focusTimer = setTimeout(() => {
                    document.title = titleConfig.focusText;
                    focusTimer = setTimeout(() => {
                        document.title = titleConfig.originalTitle;
                    }, titleConfig.focusTime);
                }, 100);
            }
        });
    });
    </script>

    <!-- 高亮处理脚本（您已有的） -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // 获取文章内容区域（根据您的网站结构调整选择器）
        const contentAreas = document.querySelectorAll('.page__content, .archive__item, article, .page');
        
        contentAreas.forEach(area => {
          if (area) {
            // 获取原始HTML
            let html = area.innerHTML;
            
            // 使用正则替换 ==xxx== 为 <mark>xxx</mark>
            html = html.replace(/(?:^|>)([^<]*?)(?:<|$)/g, function(match, textContent) {
              if (textContent && textContent.includes('==')) {
                const processedText = textContent.replace(/==(.*?)==/g, '<mark>$1</mark>');
                return match.replace(textContent, processedText);
              }
              return match;
            });
            
            area.innerHTML = html;
          }
        });
      });
    </script>
